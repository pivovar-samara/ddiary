name: PR - DDiaryMinimal Test Plan

on:
  pull_request:

concurrency:
  group: pr-ddiary-minimal-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-minimal:
    name: Run DDiaryMinimal
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run DDiaryMinimal test plan
        run: |
          xcodebuild \
            test \
            -project DDiary.xcodeproj \
            -scheme DDiary \
            -testPlan DDiaryMinimal \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro'
