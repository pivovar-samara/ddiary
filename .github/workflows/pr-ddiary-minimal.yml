name: PR - DDiaryMinimal Test Plan

on:
  pull_request:

concurrency:
  group: pr-ddiary-minimal-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-minimal:
    name: Run DDiaryMinimal
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Write Secrets.xcconfig
        run: |
          mkdir -p Configs
          cat > Configs/Secrets.xcconfig <<'EOF'
          AMPLITUDE_API_KEY_DEV = ${{ secrets.AMPLITUDE_API_KEY_DEV }}
          AMPLITUDE_API_KEY_PROD = ${{ secrets.AMPLITUDE_API_KEY_PROD }}
          SUPPORT_EMAIL_DEV = ${{ secrets.SUPPORT_EMAIL_DEV }}
          SUPPORT_EMAIL_PROD = ${{ secrets.SUPPORT_EMAIL_PROD }}
          GOOGLE_OAUTH_KEY_DEV = ${{ secrets.GOOGLE_OAUTH_KEY_DEV }}
          GOOGLE_OAUTH_KEY_PROD = ${{ secrets.GOOGLE_OAUTH_KEY_PROD }}
          GOOGLE_OAUTH_REDIRECT_SCHEME_DEV = ${{ secrets.GOOGLE_OAUTH_REDIRECT_SCHEME_DEV }}
          GOOGLE_OAUTH_REDIRECT_SCHEME_PROD = ${{ secrets.GOOGLE_OAUTH_REDIRECT_SCHEME_PROD }}
          EOF

      - name: Run DDiaryMinimal test plan
        run: |
          xcodebuild \
            test \
            -project DDiary.xcodeproj \
            -scheme DDiary \
            -testPlan DDiaryMinimal \
            -destination "platform=iOS Simulator,OS=26.2,name=iPhone 17 Pro" \
            -destination-timeout 180 \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-simulator-destinations 1
